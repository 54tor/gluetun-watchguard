# Example stack: gluetun + qBittorrent + gluetun-watchguard.
# Copy to docker-compose.yml and adjust provider/credentials before use.

services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=your_provider
      - VPN_TYPE=wireguard
      # Enable port forwarding so a NAT port is advertised on the control API.
      - VPN_PORT_FORWARDING=on
      # HTTP proxy (port 8888): watchguard tests real egress through it.
      - HTTPPROXY=on
      # The control server (port 8000) is what watchguard queries. On recent
      # gluetun versions it may require an auth config; see gluetun docs and set
      # GLUETUN_API_KEY on the watchguard service accordingly.
    ports:
      - "8080:8080" # qBittorrent WebUI, published through gluetun's namespace
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent
    container_name: qbittorrent
    network_mode: "service:gluetun" # share gluetun's network namespace
    environment:
      - WEBUI_PORT=8080
    depends_on:
      gluetun:
        condition: service_started
      # Wait until watchguard reports gluetun's egress is up before starting.
      watchguard:
        condition: service_healthy
    restart: unless-stopped

  watchguard:
    image: sat0r/gluetun-watchguard:latest
    container_name: gluetun-watchguard
    environment:
      - TORRENT_CLIENT=qbittorrent
      - GLUETUN_CONTROL_URL=http://gluetun:8000
      - GLUETUN_HTTP_PROXY=http://gluetun:8888 # outbound egress test (HTTPPROXY=on)
      # - GLUETUN_API_KEY=change_me            # if the control server needs auth
      - CLIENT_URL=http://gluetun:8080         # qBittorrent shares gluetun's net
      - CLIENT_USERNAME=admin
      - CLIENT_PASSWORD=adminadmin
      - GLUETUN_CONTAINER=gluetun              # explicit container to restart on tun loss
      # Or, instead of a fixed name, resolve by compose service (same project):
      # - GLUETUN_SERVICE=gluetun              # project auto-detected from this container
      - CHECK_INTERVAL=30
      - FAILURE_THRESHOLD=3
      - RESTART_COOLDOWN=300
      - STARTUP_GRACE=60
    healthcheck:
      # Healthy once gluetun's egress works — gates the client above.
      test: ["CMD", "gluetun-watchguard", "healthcheck"]
      interval: 30s
      timeout: 15s
      start_period: 30s
      retries: 3
    volumes:
      # Required for the recovery action (restarting gluetun). Read-write.
      # For tighter security, put a docker-socket-proxy in front and point
      # DOCKER_SOCKET at it instead of mounting the raw socket.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - gluetun
    restart: unless-stopped
