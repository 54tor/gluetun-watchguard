workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - if: '$CI_COMMIT_TAG'
      when: always
    - when: never

stages:
  - build
  - release
  - orchestrate

variables:
  DOCKER_IMAGE: "$CI_REGISTRY/tools/gluetun-watchguard"
  DOCKER_HUB_IMAGE: "$DOCKER_HUB_ORG/gluetun-watchguard"
  BUILDER_TARGET_PLATFORMS: "linux/amd64,linux/arm64"
  BASE_IMAGE: "debian-trixie"

.buildx-default: &buildx-default
  before_script:
    - docker info
    - docker run --privileged --rm tonistiigi/binfmt --install all
    - export BUILDER_NAME="gitlab-builder-$CI_JOB_ID"
    - docker buildx create --use --name "$BUILDER_NAME"
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - echo "$DOCKER_HUB_PASSWORD" | docker login -u "$DOCKER_HUB_USER" --password-stdin "https://index.docker.io/v1/"
  after_script:
    - docker buildx rm "$BUILDER_NAME" || true
  tags:
    - docker-runner

    - multi-arch
build_and_push_docker:
  <<: *buildx-default
  stage: build
  interruptible: true
  script:
    - |
      docker buildx build \
        --platform "$BUILDER_TARGET_PLATFORMS" \
        --label "org.opencontainers.image.revision=$CI_COMMIT_SHA" \
        -t "$DOCKER_IMAGE" \
        -t "$DOCKER_HUB_IMAGE" \
        --push .
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

publish_release:
  <<: *buildx-default
  stage: release
  interruptible: true
  script:
    - |
      set -eu
      . scripts/ci/derive-release-tags.sh
      DOCKER_HUB_BASE="${DOCKER_HUB_IMAGE%:*}"
      docker buildx build \
        --platform "$BUILDER_TARGET_PLATFORMS" \
        -t "${DOCKER_IMAGE}:${VERSION}" \
        -t "${DOCKER_IMAGE}:${MINOR_TAG}" \
        -t "${DOCKER_IMAGE}:${MAJOR}" \
        -t "${DOCKER_HUB_BASE}:${VERSION}" \
        -t "${DOCKER_HUB_BASE}:${MINOR_TAG}" \
        -t "${DOCKER_HUB_BASE}:${MAJOR}" \
        --push .
  rules:
    - if: '$CI_COMMIT_TAG'
      when: on_success
    - when: never

